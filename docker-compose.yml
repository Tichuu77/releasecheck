

services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     releasecheck
      POSTGRES_PASSWORD: releasecheck
      POSTGRES_DB:       releasecheck
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U releasecheck"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://releasecheck:releasecheck@db:5432/releasecheck
      PORT: 4000
      FRONTEND_URL: "http://localhost:5173"
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      VITE_API_URL: http://localhost:4000/api
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  pgdata:
